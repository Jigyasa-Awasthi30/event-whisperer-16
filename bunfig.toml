[install]

# Delay newly published packages for better supply-chain safety.
minimumReleaseAge = 172800

# Trusted packages excluded from the delay.
minimumReleaseAgeExcludes = [
  "@lovable.dev/vite-tanstack-config",
  "@lovable.dev/mcp-js",
  "@lovable.dev/vite-plugin-dev-server-bridge",
  "@lovable.dev/vite-plugin-hmr-gate",
]